version: '3.8'

services:
  # Infrastructure
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - stock_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stock_network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: stock_prediction
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stock_network

  # Application Services
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://admin:password123@postgres:5432/stock_prediction?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: "amqp://admin:password123@rabbitmq:5672"
      JWT_SECRET: "your-super-secret-key-change-me"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - stock_network

  ai-worker:
    build:
      context: ./ai
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: "amqp://admin:password123@rabbitmq:5672"
      AI_WORKER_CONCURRENCY: 4
    depends_on:
      - redis
      - rabbitmq
    networks:
      - stock_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
    depends_on:
      - backend
    networks:
      - stock_network

networks:
  stock_network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  rabbitmq_data:
