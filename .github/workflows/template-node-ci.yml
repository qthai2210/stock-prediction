name: Node.js CI Template

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: '20'
      run-build:
        required: false
        type: boolean
        default: false
      run-test:
        required: false
        type: boolean
        default: true
      run-prisma:
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Generate Prisma Client
        if: ${{ inputs.run-prisma == true }}
        working-directory: ${{ inputs.working-directory }}
        run: npx prisma generate

      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        run: npm run lint

      - name: Run Tests
        if: ${{ inputs.run-test == true }}
        working-directory: ${{ inputs.working-directory }}
        run: npm run test

      - name: Build
        if: ${{ inputs.run-build == true }}
        working-directory: ${{ inputs.working-directory }}
        run: npm run build
