name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. CI: Detect Changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai: ${{ steps.filter.outputs.ai }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - 'Dockerfile'
            ai:
              - 'ai/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
              - 'Dockerfile.frontend'

  # 2. CI: Test & Lint Backend
  test-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/template-node-ci.yml
    with:
      working-directory: 'backend'
      run-prisma: true
      run-test: true

  # 3. CI: Test & Lint AI
  test-ai:
    needs: changes
    if: ${{ needs.changes.outputs.ai == 'true' }}
    uses: ./.github/workflows/template-python-ci.yml
    with:
      working-directory: 'ai'

  # 4. CI: Test & Lint Frontend
  test-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/template-node-ci.yml
    with:
      working-directory: 'frontend'
      run-build: true
      run-test: false

  # 5. CD: Build and Push Docker Images (Main branch only)
  build-push-backend:
    needs: [changes, test-backend]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/template-docker.yml
    with:
      image-suffix: 'backend'
      context: '.'
      dockerfile: './Dockerfile'
    secrets: inherit

  build-push-ai:
    needs: [changes, test-ai]
    if: |
      always() &&
      needs.changes.outputs.ai == 'true' &&
      (needs.test-ai.result == 'success' || needs.test-ai.result == 'skipped') &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/template-docker.yml
    with:
      image-suffix: 'ai-worker'
      context: './ai'
      dockerfile: './ai/Dockerfile'
    secrets: inherit

  build-push-frontend:
    needs: [changes, test-frontend]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/template-docker.yml
    with:
      image-suffix: 'frontend'
      context: '.'
      dockerfile: './Dockerfile.frontend'
    secrets: inherit
