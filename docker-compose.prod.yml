version: '3.8'

services:
  backend:
    image: ${REGISTRY}/${IMAGE_NAME}/backend:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=${RABBITMQ_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - stock_network

  ai-worker:
    image: ${REGISTRY}/${IMAGE_NAME}/ai-worker:latest
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      - redis
      - rabbitmq
    networks:
      - stock_network

  frontend:
    image: ${REGISTRY}/${IMAGE_NAME}/frontend:latest
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${PROD_API_URL}
    ports:
      - "80:3000"
    depends_on:
      - backend
    networks:
      - stock_network

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stock_network

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - stock_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stock_network

networks:
  stock_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
